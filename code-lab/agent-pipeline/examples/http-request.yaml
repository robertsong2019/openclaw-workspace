name: http-fetch
description: 从 HTTP API 获取数据并格式化

steps:
  # 发起 HTTP GET 请求
  - tool: http.get
    config:
      url: https://api.github.com/repos/anthropics/anthropic-sdk-python
      headers:
        Accept: application/json

  # 格式化输出为 Markdown 表格
  - tool: data.format
    config:
      format: json
      indent: 2
